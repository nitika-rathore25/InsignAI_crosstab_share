<div class="backdrop" [ngStyle]="{ display: display }"></div>
<div class="modal" [ngStyle]="{'display':display}" style="top:5%;" *ngIf="downStatusModal == true">
  <div class="modal-dialog" style="max-width: 45%">
    <div class="modal-content">
      <div class="modal-body px-4">

        <!-- Header Row -->
        <div class="row mb-3 align-items-center">
          <div class="col-lg-10">
            <h4 class="modal-title ellip">All Exports</h4>
          </div>

          <div class="col-lg-2 text-end">

            <!-- Dropdown for clear history -->
            <div class="dropdown d-inline-block" *ngIf="downloadStatusList?.data.length > 0">

              <!-- Bin button -->
              <button class="btn bin_btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"
                title="Clear History">
                <i class="fa fa-trash"></i>
              </button>


              <!-- Dropdown menu -->
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <span class="dropdown-item text-danger cursor-pointer" id="cl_confirm_history"
                    (click)="clearDownloadHistory()">
                    <i class="fa fa-trash me-2"></i> Confirm Clear History
                  </span>
                </li>
              </ul>

            </div>

            <!-- Close icon -->
            <button type="button" class="close_icon ms-2" (click)="dismissStatusModal()">
              <i class="fa fa-times"></i>
            </button>

          </div>

        </div>

        <div class="row m_max_h">
          <div class="col-lg-12 mb-2 p-0 list_data" *ngIf="downloadStatusList?.data.length > 0">
            <ul class="list-group">
              <li class="list-group-item" *ngFor="let list of downloadStatusList.data; let i=index"
                [ngClass]="{ 'bg_item': list.status == 0 }">

                {{list.req_name}}

                <button class="pull-right down_not down_btn" *ngIf="list.status == 0">
                  <i class="fa fa-spinner fa-spin"></i>
                </button>

                <button class="pull-right down_not down_btn" *ngIf="list.status == 3">
                  <i class="fa fa-close clr_red"></i>
                </button>

                <button class="pull-right down_btn" id="pid_{{list.pid}}" (click)="downloadLink(list)"
                  *ngIf="list.status == 1">
                  <i class="fa fa-download"></i>
                </button>

                <br>

                <!-- Italic time -->
                <span class="sp_time italic_time">
                  {{list.time}}
                </span>

              </li>
            </ul>
          </div>

          <div class="col-lg-12 text-center" *ngIf="downloadStatusList?.data.length == 0">
            <p class="mt-1 mb-3">No exports found.</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
